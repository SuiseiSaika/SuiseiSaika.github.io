<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t d">
  <title id="t">Time-series anomaly scoring</title>
  <desc id="d">Abstract time-series signal lines with highlighted anomaly spikes and compact scoring method labels</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f263b"/>
      <stop offset="1" stop-color="#163b4c"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g opacity=".18" stroke="#dff3f2" stroke-width="2">
    <path d="M100 160h1000M100 260h1000M100 360h1000M100 460h1000M100 560h1000"/>
    <path d="M160 95v500M340 95v500M520 95v500M700 95v500M880 95v500M1060 95v500"/>
  </g>
  <path d="M95 405 C160 392 210 342 270 360 S380 418 440 385 S535 255 594 286 S700 432 760 392 S850 335 912 352 S1015 430 1105 378" fill="none" stroke="#72d4d5" stroke-width="13" stroke-linecap="round"/>
  <path d="M95 480 C190 445 255 505 335 466 S495 402 585 440 S750 530 845 475 S980 410 1105 455" fill="none" stroke="#8fb8ff" stroke-width="7" stroke-linecap="round" opacity=".68"/>
  <g>
