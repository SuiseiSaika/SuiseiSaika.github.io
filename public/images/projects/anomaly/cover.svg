    <text x="535" y="146" text-anchor="middle" fill="#f4b860" font-family="Arial, sans-serif" font-size="28" font-weight="700">spike</text>
  </g>
  <g>
    <circle cx="912" cy="352" r="38" fill="#ff7f7f" opacity=".2" filter="url(#soft)"/>
    <circle cx="912" cy="352" r="20" fill="#ff7f7f"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">
    <rect x="160" y="105" width="98" height="54" rx="18" fill="#dff3f2" opacity=".95"/>
    <rect x="280" y="105" width="98" height="54" rx="18" fill="#dff3f2" opacity=".95"/>
    <rect x="400" y="105" width="98" height="54" rx="18" fill="#dff3f2" opacity=".95"/>
    <rect x="520" y="105" width="98" height="54" rx="18" fill="#dff3f2" opacity=".95"/>
